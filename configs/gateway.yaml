server:
  port: 8080
  read_timeout: 30s
  write_timeout: 120s

providers:
  openai:
    base_url: "https://api.openai.com/v1"
    timeout: 30s
    models:
      - gpt-4o
      - gpt-4o-mini
      - gpt-3.5-turbo
  anthropic:
    base_url: "https://api.anthropic.com"
    timeout: 30s
    models:
      - claude-sonnet-4-20250514
      - claude-haiku-35-20241022
  google:
    base_url: "https://generativelanguage.googleapis.com/v1beta"
    timeout: 30s
    models:
      - gemini-2.0-flash
      - gemini-2.0-pro

# model_aliases:
#   "gpt4": "gpt-4o"
#   "claude": "claude-sonnet-4-20250514"
#   "gemini": "gemini-2.0-flash"

log:
  level: info
  format: json
  debug_bodies: false
